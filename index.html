<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Greysteel — Unit Walkthrough</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">

  <div class="login-bg">
    <div class="login-grid"></div>
  </div>

  <div class="login-wrap">
    <div class="login-card">
      <div class="gs-lockup">
        <div class="gs-wordmark">GREY<span>STEEL</span></div>
        <div class="gs-rule"></div>
        <div class="gs-tagline">Unit Walkthrough Tool</div>
      </div>

      <form id="login-form" autocomplete="off">
        <div class="field-group">
          <label class="field-label" for="password">Access code</label>
          <input
            type="password"
            id="password"
            class="field-input"
            placeholder="Enter access code"
            autofocus
          >
          <div class="field-error" id="login-error">Incorrect access code. Please try again.</div>
        </div>
        <button type="submit" class="btn-primary-full">Enter</button>
      </form>

      <p class="login-footer">Greysteel Commercial Real Estate &middot; Internal Use Only</p>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
